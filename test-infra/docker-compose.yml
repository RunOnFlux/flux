name: flux-e2e

networks:
  flux-test-net:
    driver: bridge
    ipam:
      config:
        - subnet: 198.18.0.0/16

volumes:
  mongo-data:
  docker-01-data:
  appdata-01:
  docker-02-data:
  appdata-02:
  docker-03-data:
  appdata-03:
  docker-04-data:
  appdata-04:
  docker-05-data:
  appdata-05:
  docker-06-data:
  appdata-06:
  docker-07-data:
  appdata-07:
  docker-08-data:
  appdata-08:
  docker-09-data:
  appdata-09:
  docker-10-data:
  appdata-10:
  docker-11-data:
  appdata-11:
  docker-12-data:
  appdata-12:
  docker-13-data:
  appdata-13:
  docker-14-data:
  appdata-14:
  docker-15-data:
  appdata-15:
  docker-16-data:
  appdata-16:

services:
  mongodb:
    image: mongo:8
    command: ["--wiredTigerCacheSizeGB", "1", "--setParameter", "maxNumActiveUserIndexBuilds=64"]
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      flux-test-net:
        ipv4_address: 198.18.0.2
    volumes:
      - mongo-data:/data/db
      - ./fixtures/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  daemon-stub:
    build: ./daemon-stub
    networks:
      flux-test-net:
        ipv4_address: 198.18.0.3
    environment:
      FLUXD_PORT: "16124"
      BENCHD_PORT: "16224"
      CONTROL_PORT: "18232"
    volumes:
      - ./fixtures:/fixtures
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:18232/state', r => { r.on('data', () => {}); r.statusCode === 200 ? process.exit(0) : process.exit(1) })"]
      interval: 5s
      timeout: 5s
      retries: 5

  syncthing-stub:
    build: ./syncthing-stub
    networks:
      flux-test-net:
        ipv4_address: 198.18.0.4
    environment:
      SYNCTHING_PORT: "8384"
      CONTROL_PORT: "8385"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8384/rest/noauth/health', r => { r.on('data', () => {}); r.statusCode === 200 ? process.exit(0) : process.exit(1) })"]
      interval: 5s
      timeout: 5s
      retries: 5

  fluxos-01:
    build:
      context: ..
      dockerfile: test-infra/Dockerfile.fluxos
    privileged: true
    networks:
      flux-test-net:
        ipv4_address: 198.18.1.0
    volumes:
      - docker-01-data:/var/lib/docker
      - appdata-01:/mnt/appdata
    environment:
      # Arcane OS
      FLUX_LOG_CONSOLE: "1"
      FLUXOS_PATH: "/flux"
      FLUXD_PATH: "/dat/var/lib/fluxd"
      FLUXD_CONFIG_PATH: "/flux/test-infra/fixtures/conf/flux-01.conf"
      SYNCTHING_PATH: "/dat/usr/lib/syncthing"
      FLUXBENCH_PATH: "/dat/usr/lib/fluxbenchd"
      FLUX_WATCHDOG_PATH: "/dat/usr/lib/fluxwatchdog"
      FLUX_APPS_FOLDER: "/mnt/appdata/flux-apps"
      # Database
      FLUX_DB_PREFIX: "node01_"
      FLUX_DB_HOST: "198.18.0.2"
      FLUX_DB_PORT: "27017"
      # Services
      FLUX_DAEMON_HOST: "198.18.0.3"
      FLUX_BENCH_HOST: "198.18.0.3"
      FLUX_SYNCTHING_HOST: "198.18.0.4"
      # Node identity
      FLUX_NODE_IP: "198.18.1.0"
      FLUX_ADMIN_ZELID: "14dQFmgDLVEVG7vNH8ibWuUEkuvxuogg13"
      FLUX_API_PORT: "16127"
      # Peer thresholds
      FLUX_MIN_OUTGOING: "4"
      FLUX_MIN_INCOMING: "2"
      FLUX_MIN_UNIQUE_OUTGOING: "3"
      FLUX_MIN_UNIQUE_INCOMING: "2"
      FLUX_MIN_HASH_SYNC_PEERS: "4"
      # Timing compression
      FLUX_BOOT_DELAY_MULTIPLIER: "0.1"
      FLUX_SPAWN_DELAY_MS: "10000"
      FLUX_INSTALL_COLLISION_WAIT_MS: "5000"
      FLUX_SPAWN_RECONFIRM_DELAY_MS: "30000"
      FLUX_SPAWN_NO_APPS_DELAY_MS: "15000"
      FLUX_LOCATION_TTL_S: "300"
      FLUX_INSTALLING_TTL_S: "60"
      FLUX_TEMP_MSG_TTL_S: "300"
      FLUX_HASH_SYNC_INTERVAL_MS: "30000"
      FLUX_PEER_NOTIFY_INTERVAL_MS: "30000"
      FLUX_CPU_CHECK_INTERVAL_MS: "30000"
      FLUX_PORT_RESTORE_INTERVAL_MS: "30000"
      FLUX_IMAGE_COMPLIANCE_INTERVAL_MS: "60000"
      FLUX_FORCE_REMOVAL_INTERVAL_MS: "120000"
      FLUX_REMOVAL_SPACING_MS: "1000"
    depends_on:
      mongodb:
        condition: service_healthy
      daemon-stub:
        condition: service_healthy
      syncthing-stub:
        condition: service_healthy

